<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khám phá khóa học — StudyOnline</title>
  <meta name="description" content="Khám phá, tìm kiếm và đăng ký khóa học chất lượng cao trên StudyOnline.">
  <link rel="stylesheet" href="/studyonline/frontend/css/student.css">
  <style>
    /* Hero */
    .explore-hero{background:linear-gradient(135deg,#1e3a8a,#2563EB 40%,#7C3AED 80%,#06B6D4);border-radius:var(--s-radius);padding:2.5rem 2rem;color:#fff;margin-bottom:2rem;position:relative;overflow:hidden;}
    .explore-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;background:rgba(255,255,255,.06);border-radius:50%;}
    .explore-hero::after{content:'🔍';position:absolute;right:2rem;top:50%;transform:translateY(-50%);font-size:5rem;opacity:.12;}
    .explore-hero h1{font-size:1.6rem;font-weight:800;margin-bottom:.35rem;}
    .explore-hero p{opacity:.85;font-size:.9rem;margin-bottom:1.25rem;}
    .hero-search{display:flex;gap:.75rem;max-width:600px;}
    .hero-search input{flex:1;padding:.7rem 1.1rem;border-radius:10px;border:none;font-size:.9rem;font-family:inherit;outline:none;box-shadow:0 2px 12px rgba(0,0,0,.15);color:var(--s-text);}
    .hero-search button{padding:.7rem 1.4rem;background:#fff;color:var(--s-primary);border:none;border-radius:10px;font-weight:700;font-size:.875rem;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .hero-search button:hover{background:var(--s-surface-2);transform:translateY(-1px);}
    .stats-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:.75rem;font-size:.82rem;}
    .stats-row span{background:rgba(255,255,255,.15);border-radius:999px;padding:.2rem .75rem;font-weight:600;}
    /* Category pills */
    .cat-pills{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
    .cat-pill{padding:.4rem .9rem;border-radius:999px;border:1.5px solid var(--s-border);font-size:.8rem;font-weight:600;cursor:pointer;background:var(--s-surface);color:var(--s-text-muted);transition:all .2s;font-family:inherit;}
    .cat-pill:hover{border-color:var(--s-primary);color:var(--s-primary);}
    .cat-pill.active{background:var(--s-primary);color:#fff;border-color:var(--s-primary);}
    /* Sort bar */
    .sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem;}
    .sort-bar .count{font-size:.875rem;color:var(--s-text-muted);}
    .sort-bar .count strong{color:var(--s-text);}
    .sort-bar select{padding:.4rem .875rem;border:1.5px solid var(--s-border);border-radius:8px;font-size:.85rem;font-family:inherit;background:var(--s-surface);color:var(--s-text);outline:none;cursor:pointer;}
    /* Level badge */
    .level-badge{font-size:.72rem;font-weight:700;padding:.15rem .5rem;border-radius:5px;}
    .level-begin{background:rgba(16,185,129,.1);color:var(--s-success);}
    .level-mid{background:rgba(245,158,11,.1);color:var(--s-warning);}
    .level-adv{background:rgba(239,68,68,.1);color:var(--s-danger);}
    /* Price */
    .price-free{font-size:.78rem;font-weight:700;color:var(--s-success);}
    .price-paid{font-size:.82rem;font-weight:700;color:var(--s-primary);}
    /* Enroll badge */
    .enroll-badge{position:absolute;top:.75rem;right:.75rem;background:rgba(255,255,255,.2);color:#fff;padding:.2rem .6rem;border-radius:999px;font-size:.72rem;font-weight:700;backdrop-filter:blur(4px);}
    .enrolled-badge{background:rgba(16,185,129,.8)!important;}
    .s-course-thumb{position:relative;}
    /* Empty / no-result */
    .no-result{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--s-text-muted);}
    .no-result .icon{font-size:3rem;margin-bottom:1rem;}
    .no-result h3{font-size:1.1rem;font-weight:700;color:var(--s-text);margin-bottom:.35rem;}
    /* Skeleton */
    .skeleton-card{background:var(--s-surface);border-radius:var(--s-radius);border:1px solid var(--s-border);overflow:hidden;}
    .sk{background:var(--s-surface-2);border-radius:6px;animation:pulse 1.4s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .sk-thumb{height:150px;border-radius:0;}
    .sk-body{padding:1.125rem;}
    .sk-line{height:12px;margin-bottom:.6rem;}
    .sk-line.w80{width:80%}.sk-line.w60{width:60%}.sk-line.w40{width:40%}
    /* Modal */
    .modal-wrap{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;padding:1rem;}
    .modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);}
    .modal-box{position:relative;background:var(--s-surface);border-radius:16px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;animation:modalIn .25s ease;}
    @keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-body{padding:1.5rem;}
    .detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;background:var(--s-surface-2);border-radius:10px;padding:1rem;text-align:center;}
    .detail-stats div{display:flex;flex-direction:column;gap:.2rem;}
    .detail-stats strong{font-size:1rem;font-weight:800;color:var(--s-text);}
    .detail-stats span{font-size:.72rem;color:var(--s-text-muted);}
    /* Payment */
    .pay-methods{display:flex;flex-direction:column;gap:.5rem;}
    .pay-method{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border:1.5px solid var(--s-border);border-radius:10px;cursor:pointer;transition:all .2s;font-size:.875rem;font-weight:500;}
    .pay-method input{accent-color:var(--s-primary);}
    .pay-method.active{border-color:var(--s-primary);background:rgba(37,99,235,.05);}
    /* Toast */
    #toastContainer{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;}
    .toast-item{background:var(--s-surface);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:.875rem 1.25rem;font-size:.875rem;font-weight:600;color:var(--s-text);opacity:0;transform:translateX(40px);transition:all .35s ease;max-width:340px;}
    .toast-item.toast-show{opacity:1;transform:translateX(0);}
  </style>
</head>

<body class="student-layout">
  <div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;transition:.2s;"
    onclick="this.style.display='none';document.getElementById('studentSidebar').classList.remove('mobile-open')"></div>

  <!-- SIDEBAR -->
  <aside class="s-sidebar" id="studentSidebar">
    <a class="s-sidebar-logo" href="/studyonline/frontend/pages/home.html">
      <div class="logo-icon">🎓</div><span class="logo-text">StudyOnline</span>
    </a>
    <nav class="s-sidebar-nav">
      <a class="s-nav-item" href="/studyonline/frontend/pages/student/dashboard.html"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></a>
      <a class="s-nav-item" href="/studyonline/frontend/pages/student/my-courses.html"><span class="nav-icon">📚</span><span class="nav-label">Khóa học của tôi</span></a>
      <a class="s-nav-item" href="/studyonline/frontend/pages/student/progress.html"><span class="nav-icon">📈</span><span class="nav-label">Tiến độ học tập</span></a>
      <a class="s-nav-item" href="/studyonline/frontend/pages/quiz.html"><span class="nav-icon">📝</span><span class="nav-label">Quiz</span></a>
      <a class="s-nav-item" href="/studyonline/frontend/pages/student/certificates.html"><span class="nav-icon">🏆</span><span class="nav-label">Chứng chỉ</span></a>
      <div class="s-nav-divider"></div>
      <a class="s-nav-item active" href="/studyonline/frontend/pages/student/courses.html"><span class="nav-icon">🌐</span><span class="nav-label">Khám phá</span></a>
      <a class="s-nav-item" href="/studyonline/frontend/pages/student/profile.html"><span class="nav-icon">👤</span><span class="nav-label">Hồ sơ cá nhân</span></a>
      <button class="s-nav-item" onclick="studentLogout()"><span class="nav-icon">🚪</span><span class="nav-label">Đăng xuất</span></button>
    </nav>
  </aside>

  <div class="s-wrapper">
    <!-- HEADER -->
    <header class="s-header">
      <button class="s-toggle-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
      <div class="s-header-actions">
        <button class="s-icon-btn" title="Thông báo">🔔<span class="s-notif-badge"></span></button>
        <div class="s-avatar-wrap" id="avatarWrap">
          <div class="s-avatar" id="headerAvatar">?</div>
          <span class="s-avatar-name" id="headerName">Học viên</span>
          <span style="color:var(--s-text-muted);font-size:.8rem;">▾</span>
          <div class="s-dropdown" id="avatarDropdown">
            <a href="/studyonline/frontend/pages/student/profile.html">👤 Hồ sơ</a>
            <hr>
            <button onclick="studentLogout()">🚪 Đăng xuất</button>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="s-main">
      <!-- Hero -->
      <div class="explore-hero">
        <h1>🌐 Khám phá khóa học</h1>
        <p>Tìm kiếm và đăng ký hàng trăm khóa học chất lượng cao — học bất cứ lúc nào.</p>
        <div class="hero-search">
          <input type="text" id="heroSearch" placeholder="Tìm tên khóa học, chủ đề, kỹ năng..." autocomplete="off">
          <button onclick="document.getElementById('heroSearch').dispatchEvent(new Event('input'))">🔍 Tìm kiếm</button>
        </div>
        <div class="stats-row" id="statsRow"><span>⏳ Đang tải...</span></div>
      </div>

      <!-- Category pills -->
      <div class="cat-pills" id="catPills">
        <button class="cat-pill active" data-cat="all">🌟 Tất cả</button>
        <button class="cat-pill" data-cat="web">🌐 Web</button>
        <button class="cat-pill" data-cat="mobile">📱 Mobile</button>
        <button class="cat-pill" data-cat="data">📊 Data</button>
        <button class="cat-pill" data-cat="design">🎨 Design</button>
        <button class="cat-pill" data-cat="backend">⚙️ Backend</button>
        <button class="cat-pill" data-cat="other">📦 Khác</button>
      </div>

      <!-- Sort bar -->
      <div class="sort-bar">
        <div class="count" id="countLabel">Đang tải...</div>
        <select id="sortSelect">
          <option value="newest">Mới nhất</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="price_asc">Giá thấp → cao</option>
          <option value="price_desc">Giá cao → thấp</option>
        </select>
      </div>

      <!-- Course Grid -->
      <div class="s-course-grid" id="courseGrid">
        <div class="skeleton-card"><div class="sk sk-thumb"></div><div class="sk-body"><div class="sk sk-line w80"></div><div class="sk sk-line w60"></div><div class="sk sk-line w40"></div></div></div>
        <div class="skeleton-card"><div class="sk sk-thumb"></div><div class="sk-body"><div class="sk sk-line w80"></div><div class="sk sk-line w60"></div><div class="sk sk-line w40"></div></div></div>
        <div class="skeleton-card"><div class="sk sk-thumb"></div><div class="sk-body"><div class="sk sk-line w80"></div><div class="sk sk-line w60"></div><div class="sk sk-line w40"></div></div></div>
      </div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div class="modal-wrap" id="detailModal"></div>

  <!-- Payment Modal -->
  <div class="modal-wrap" id="paymentModal"></div>

  <!-- Toast -->
  <div id="toastContainer"></div>

  <script src="/studyonline/frontend/js/api.js?v=1.3"></script>
  <script src="/studyonline/frontend/js/student-dashboard.js?v=1.3"></script>
  <script src="/studyonline/frontend/js/student-courses.js?v=1.3"></script>
</body>
</html>
