<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Câu hỏi Quiz — StudyOnline</title>
  <link rel="stylesheet" href="/studyonline/frontend/css/studyonline.css">
  <style>
    /* Premium Page Styles */
    .page-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .breadcrumb {
      margin-bottom: 1rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .breadcrumb a {
      color: var(--text-muted);
      font-weight: 500;
    }
    .breadcrumb a:hover {
      color: var(--primary);
    }
    .breadcrumb .sep {
      color: var(--text-light);
    }
    #quizTitle {
      color: var(--text);
      font-weight: 600;
    }

    /* Question Cards */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .question-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary-light);
    }
    .question-num {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
      background: var(--primary-light);
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 1rem;
    }
    .question-content {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--secondary);
      line-height: 1.6;
    }
    .option-item {
      padding: 0.85rem 1.25rem;
      border-radius: var(--radius);
      background: var(--surface-2);
      border: 1.5px solid transparent;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
      color: var(--text);
    }
    .option-item.correct {
      color: var(--success);
      font-weight: 600;
      background: rgba(16, 185, 129, 0.05);
      border-color: var(--success);
    }
    .option-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }

    /* Modal Overlay & Box */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border);
      animation: modalFadeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalFadeIn {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }
    .modal-header h3 {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--secondary);
    }
    .modal-close {
      background: var(--surface-2);
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .modal-close:hover {
      background: var(--danger-bg);
      color: var(--danger);
    }

    /* Form Grid Layout */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 576px) {
      .form-grid {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
  </style>
</head>
<body data-page="quiz-questions">
  <nav class="navbar" id="navbar"></nav>

  <main class="page" style="padding-top: 2rem; padding-bottom: 4rem;">
    <div class="container">
      <div class="breadcrumb">
        <a href="/studyonline/frontend/pages/teacher/dashboard.html#quizzes">📚 Quản lý Quiz</a>
        <span class="sep">›</span>
        <span id="quizTitle">Câu hỏi</span>
      </div>

      <div class="page-header">
        <div>
          <h1 class="page-title" style="font-size: 1.6rem; font-weight: 800;">❓ Quản lý Câu hỏi</h1>
          <p class="page-subtitle" style="margin-top: 0.25rem; font-size: 0.88rem;">Biên soạn nội dung trắc nghiệm và đáp án đúng cho bài kiểm tra.</p>
        </div>
        <button class="btn btn-primary" id="addQuestionBtn" style="padding: 0.6rem 1.25rem;">+ Thêm câu hỏi mới</button>
      </div>

      <div id="alertBox"></div>
      <div id="questionList">
        <div class="loading-page"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="questionModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">Thêm câu hỏi</h3>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <form id="questionForm">
        <div class="form-group">
          <label class="form-label">Nội dung câu hỏi <span style="color:var(--danger)">*</span></label>
          <textarea class="form-control" name="content" rows="3" placeholder="Nhập nội dung câu hỏi..." required style="resize: vertical; min-height: 80px;"></textarea>
        </div>
        
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Đáp án A <span style="color:var(--danger)">*</span></label>
            <input class="form-control" type="text" name="option_a" placeholder="Nập đáp án A" required>
          </div>
          <div class="form-group">
            <label class="form-label">Đáp án B <span style="color:var(--danger)">*</span></label>
            <input class="form-control" type="text" name="option_b" placeholder="Nhập đáp án B" required>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Đáp án C</label>
            <input class="form-control" type="text" name="option_c" placeholder="Nhập đáp án C (tùy chọn)">
          </div>
          <div class="form-group">
            <label class="form-label">Đáp án D</label>
            <input class="form-control" type="text" name="option_d" placeholder="Nhập đáp án D (tùy chọn)">
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Đáp án đúng <span style="color:var(--danger)">*</span></label>
            <select class="form-control" name="correct_answer" required>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Thứ tự hiển thị</label>
            <input class="form-control" type="number" name="order_index" value="0" min="0">
          </div>
        </div>

        <div style="display:flex; gap:0.75rem; justify-content:flex-end; margin-top:2rem; border-top:1px solid var(--border); padding-top:1.25rem;">
          <button type="button" class="btn btn-ghost" onclick="document.getElementById('questionModal').style.display='none'">Hủy bỏ</button>
          <button type="submit" class="btn btn-primary">Lưu câu hỏi</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/studyonline/frontend/js/api.js"></script>
  <script src="/studyonline/frontend/js/quiz.js"></script>
</body>
</html>
