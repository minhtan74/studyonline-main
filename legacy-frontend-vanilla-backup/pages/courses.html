<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khóa học — StudyOnline</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/studyonline/frontend/js/tailwind-browser-v4.js"></script>
  <style type="text/tailwindcss">
    body { font-family: 'Inter', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.6s linear infinite; }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

  <!-- NAVBAR -->
  <nav id="navbar" class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm"></nav>

  <main class="py-8 px-6">
    <div class="max-w-6xl mx-auto">

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-8 flex-wrap gap-4">
        <div>
          <h1 class="text-2xl font-extrabold text-slate-900">📚 Khóa học</h1>
          <p class="text-slate-500 text-sm mt-1">Quản lý toàn bộ khóa học trên hệ thống</p>
        </div>
        <button id="addCourseBtn"
          class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded-xl transition-all shadow-sm hover:shadow-md flex items-center gap-2">
          + Thêm khóa học
        </button>
      </div>

      <!-- Alert Box -->
      <div id="alertBox" class="mb-4"></div>

      <!-- Table Card -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-200">
                <th class="text-left px-5 py-3.5 text-xs font-bold uppercase text-slate-500 tracking-wider">Tên khóa học
                </th>
                <th class="text-left px-5 py-3.5 text-xs font-bold uppercase text-slate-500 tracking-wider">ID</th>
                <th class="text-right px-5 py-3.5 text-xs font-bold uppercase text-slate-500 tracking-wider">Thao tác
                </th>
              </tr>
            </thead>
            <tbody id="courseList" class="divide-y divide-slate-100">
              <tr>
                <td colspan="3" class="text-center py-12 text-slate-400">
                  <div
                    class="inline-block w-8 h-8 border-2 border-slate-200 border-t-blue-500 rounded-full spinner mb-3">
                  </div>
                  <div class="text-sm">Đang tải dữ liệu...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <!-- MODAL -->
  <div id="courseModal"
    class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
        <h3 id="modalTitle" class="text-lg font-bold text-slate-900">Thêm khóa học</h3>
        <button id="closeModal"
          class="text-slate-400 hover:text-slate-600 text-2xl leading-none transition-colors">×</button>
      </div>
      <div class="px-6 py-5">
        <form id="courseForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Tiêu đề khóa học <span
                class="text-red-500">*</span></label>
            <input
              class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all"
              type="text" name="title" placeholder="Vd: Lập trình PHP từ cơ bản..." required>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Mô tả</label>
            <textarea
              class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all resize-y min-h-[100px]"
              name="description" placeholder="Mô tả ngắn về khóa học..."></textarea>
          </div>
          <div class="flex gap-3 justify-end pt-2">
            <button type="button" id="cancelModal"
              class="px-5 py-2.5 border border-slate-300 text-slate-700 hover:bg-slate-100 font-semibold text-sm rounded-xl transition-all">
              Hủy
            </button>
            <button type="submit"
              class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded-xl transition-all shadow-sm">
              Lưu
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/studyonline/frontend/js/api.js"></script>
  <script src="/studyonline/frontend/js/courses.js"></script>
  <script>
    // Tailwind navbar
    document.addEventListener('DOMContentLoaded', () => {
      const user = Api.getUser();
      const nav = document.getElementById('navbar');
      const role = user?.role;
      let panelLink = '';
      if (role === 'admin') panelLink = `<a href="/studyonline/frontend/pages/admin/dashboard.html" class="text-slate-600 hover:text-blue-600 font-medium text-sm px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-all">Admin Panel</a>`;
      else if (role === 'teacher') panelLink = `<a href="/studyonline/frontend/pages/teacher/dashboard.html" class="text-slate-600 hover:text-blue-600 font-medium text-sm px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-all">Teacher Panel</a>`;
      else if (role === 'student') panelLink = `<a href="/studyonline/frontend/pages/student/dashboard.html" class="text-slate-600 hover:text-blue-600 font-medium text-sm px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-all">Dashboard</a>`;
      nav.innerHTML = `
        <div class="max-w-6xl mx-auto px-6 flex items-center justify-between h-16">
          <div class="flex items-center gap-1">
            <a href="/studyonline/frontend/pages/home.html" class="text-blue-600 font-extrabold text-xl flex items-center gap-2">🎓 <span class="text-slate-900">StudyOnline</span></a>
            <a href="/studyonline/frontend/pages/home.html" class="ml-4 text-slate-600 hover:text-blue-600 font-medium text-sm px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-all">Trang chủ</a>
          </div>
          <div class="flex items-center gap-2">
            ${panelLink}
            ${user ? `<button onclick="doLogout()" class="px-4 py-2 border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white font-semibold text-sm rounded-lg transition-all">Đăng xuất (${user.fullname?.split(' ').pop()})</button>`
          : `<a href="/studyonline/frontend/pages/login.html" class="px-4 py-2 border border-blue-600 text-blue-600 hover:bg-blue-50 font-semibold text-sm rounded-lg transition-all">Đăng nhập</a>
                      <a href="/studyonline/frontend/pages/register.html" class="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 font-semibold text-sm rounded-lg transition-all shadow-sm">Đăng ký</a>`}
          </div>
        </div>`;

      document.getElementById('cancelModal')?.addEventListener('click', () => {
        document.getElementById('courseModal').classList.add('hidden');
      });
      document.getElementById('closeModal')?.addEventListener('click', () => {
        document.getElementById('courseModal').classList.add('hidden');
      });
    });
    async function doLogout() { await Api.logout(); Api.clearAuth(); window.location.href = '/studyonline/frontend/pages/home.html'; }
  </script>
</body>

</html>
